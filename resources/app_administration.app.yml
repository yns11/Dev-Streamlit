resources:
  apps:
    bl_administration:
      name: bl-administration-${bundle.target}
      description: "Administration de BL dématérialisés — approvisionneurs"
      source_code_path: ../src/app_administration
      resources:
        - name: sql-warehouse
          description: Warehouse pour lire/écrire les tables Delta
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: volume
          description: Volume UC des images de BL (lecture des photos)
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.catalog}.${var.schema}.${var.volume}
            permission: READ_VOLUME
